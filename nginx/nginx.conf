upstream frontend {
  server frontend:3000;
}

upstream backend {
  server backend:9000;
}

# ── CENTRAL ──────────────────────────────────────────────
server {
   listen 80;
   server_name inmobiliaria.test;

  index index.php index.html;
  error_log  /var/log/nginx/error.log;
  access_log /var/log/nginx/access.log;
  root /var/www/html/public;

  location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
  }

  location /api {
      try_files $uri $uri/ /index.php?$query_string;
      gzip_static on;
  }

  location ^~ /storage/ {
      alias /var/www/html/public/storage/;
      try_files $uri $uri/ =404;
  }

  location ~ \.php$ {
      fastcgi_split_path_info ^(.+\.php)(/.+)$;
      fastcgi_pass backend;
      fastcgi_index index.php;
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      fastcgi_param PATH_INFO $fastcgi_path_info;
  }
}

# ── TENANTS (*.inmobiliaria.test) ────────────────────────
server {
   listen 80;
   server_name ~^(?<tenant>.+)\.inmobiliaria\.test$;

  index index.php index.html;
  error_log  /var/log/nginx/error.log debug;
  access_log /var/log/nginx/access.log;
  root /var/www/html/public;

  location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
  }

  location /api {
      try_files $uri $uri/ /index.php?$query_string;
      gzip_static on;
  }

  # Storage TENANTS — usando root + rewrite en lugar de alias
  location ~ ^/storage/(tenant[a-zA-Z0-9_-]+)/(.+)$ {
      root /var/www/html;
      rewrite ^/storage/(tenant[a-zA-Z0-9_-]+)/(.+)$ /storage/$1/app/public/$2 break;
      try_files $uri =404;
      expires 30d;
      add_header Cache-Control "public, immutable";
  }

  location ~ \.php$ {
      fastcgi_split_path_info ^(.+\.php)(/.+)$;
      fastcgi_pass backend;
      fastcgi_index index.php;
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      fastcgi_param PATH_INFO $fastcgi_path_info;
  }
}
