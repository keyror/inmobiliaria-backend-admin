# ── CENTRAL: inmobiliaria.com ────────────────────────────
server {
    listen 80;
    server_name inmobiliaria.com;
    root /var/www/html/public;
    index index.php index.html;

    # ── STORAGE CENTRAL ──────────────────────────────────
    location ^~ /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── API → PHP-FPM ────────────────────────────────────
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param SERVER_NAME $http_host;
    }
}

# ── TENANTS: *.inmobiliaria.com ──────────────────────────
server {
    listen 80;
    server_name ~^(?<tenant>.+)\.inmobiliaria\.com$;
    root /var/www/html/public;
    index index.php index.html;

    # ── STORAGE TENANTS ──────────────────────────────────
    location ~ ^/storage/(tenant[a-zA-Z0-9_-]+)/(.+)$ {
        root /var/www/html;
        rewrite ^/storage/(tenant[a-zA-Z0-9_-]+)/(.+)$ /storage/$1/app/public/$2 break;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── API → PHP-FPM ────────────────────────────────────
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param SERVER_NAME $http_host;
    }
}
