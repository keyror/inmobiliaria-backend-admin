services:
    backend:
        build:
            context: .
            dockerfile: Dockerfile
        image: backend-inmobiliaria:latest
        container_name: backend
        volumes:
            - .:/var/www/html
            - ./storage:/var/www/html/storage
            - ./storage/app/public:/var/www/html/public/storage
        environment:
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: realstate_central
            DB_USERNAME: root
            DB_PASSWORD: root
        depends_on:
            - mysql
        networks:
            - inmobiliaria-network

    frontend:
        build:
            context: ../frontend
            dockerfile: Dockerfile
        image: frontend-inmobiliaria:latest
        container_name: frontend
        volumes:
            - ../frontend:/usr/share/nginx/html
        networks:
            - inmobiliaria-network

    webserver:
        depends_on:
            - backend
            - frontend
        build:
            context: ./nginx
            dockerfile: Dockerfile
        image: webserver-inmobiliaria:latest
        container_name: webserver
        volumes:
            - ./public:/var/www/html/public
            - ./storage/app/public:/var/www/html/public/storage
        restart: unless-stopped
        ports:
            - "80:80"
        networks:
            - inmobiliaria-network


    mysql:
        image: mysql:8
        container_name: mysql
        restart: unless-stopped
        ports:
            - "3307:3306"
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: realstate_central
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - inmobiliaria-network

networks:
    inmobiliaria-network:
        driver: bridge

volumes:
    mysql_data:
