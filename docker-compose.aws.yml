services:
  # ═══════════════════════════════════════════════════════════
  # TRAEFIK - Configuración para DuckDNS
  # ═══════════════════════════════════════════════════════════
  traefik:
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=inmobiliaria-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # ── Let's Encrypt para SSL automático ──
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # ── Redirección HTTP → HTTPS ──
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    volumes: !override
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/letsencrypt:/letsencrypt

  # ═══════════════════════════════════════════════════════════
  # BACKEND - Variables para DuckDNS + Docker Hub Image
  # ═══════════════════════════════════════════════════════════
  backend:
    image: ${BACKEND_IMAGE}
    volumes: !override
      - ./storage:/var/www/html/storage
    environment:
      # Base de datos
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

      # URLs de la aplicación
      - APP_URL=${APP_URL}
      - APP_DOMAIN=${APP_DOMAIN}
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG}
      - APP_KEY=${APP_KEY}
      - CORS_ALLOWED_ORIGINS=${BACKEND_CORS_ALLOWED_ORIGINS}

      # Cache / Redis
      - CACHE_STORE=${CACHE_STORE}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  # ═══════════════════════════════════════════════════════════
  # NGINX-STORAGE - Docker Hub Image + Labels para DuckDNS
  # ═══════════════════════════════════════════════════════════
  nginx-storage:
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    image: ${NGINX_STORAGE_IMAGE}
    labels:
      - "traefik.enable=true"

      # ── STORAGE: dominio principal + tenants /storage ──────── prio 300
      - "traefik.http.routers.storage.rule=PathPrefix(`/storage`) && (Host(`${APP_DOMAIN}`) || HostRegexp(`${APP_DOMAIN_REGEX}`))"
      - "traefik.http.routers.storage.entrypoints=websecure"
      - "traefik.http.routers.storage.tls=true"
      - "traefik.http.routers.storage.tls.certresolver=letsencrypt"
      - "traefik.http.routers.storage.priority=300"
      - "traefik.http.routers.storage.service=nginx-svc"

      # ── API: dominio principal + tenants /api ── prio 200
      - "traefik.http.routers.api-path.rule=PathPrefix(`/api`) && (Host(`${APP_DOMAIN}`) || HostRegexp(`${APP_DOMAIN_REGEX}`))"
      - "traefik.http.routers.api-path.entrypoints=websecure"
      - "traefik.http.routers.api-path.tls=true"
      - "traefik.http.routers.api-path.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api-path.priority=200"
      - "traefik.http.routers.api-path.service=nginx-svc"

      # ── STORAGE: dominios custom de tenants /storage ─────── prio 150
      - "traefik.http.routers.storage-custom.rule=PathPrefix(`/storage`)"
      - "traefik.http.routers.storage-custom.entrypoints=websecure"
      - "traefik.http.routers.storage-custom.tls=true"
      - "traefik.http.routers.storage-custom.tls.certresolver=letsencrypt"
      - "traefik.http.routers.storage-custom.priority=150"
      - "traefik.http.routers.storage-custom.service=nginx-svc"

      # ── API: dominios custom de tenants /api ─────────────── prio 100
      - "traefik.http.routers.api-custom.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api-custom.entrypoints=websecure"
      - "traefik.http.routers.api-custom.tls=true"
      - "traefik.http.routers.api-custom.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api-custom.priority=100"
      - "traefik.http.routers.api-custom.service=nginx-svc"

      # ── Servicio ──────────────────────────────────────────
      - "traefik.http.services.nginx-svc.loadbalancer.server.port=80"

  # ═══════════════════════════════════════════════════════════
  # FRONTEND-ADMIN - Docker Hub Image + Multitenant Support
  # ═══════════════════════════════════════════════════════════
  frontend-admin:
    image: ${FRONTEND_ADMIN_IMAGE}
    labels:
      - "traefik.enable=true"

      # ── ADMIN central: dominio principal /admin ────── prio 150
      - "traefik.http.routers.admin-central.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.admin-central.entrypoints=websecure"
      - "traefik.http.routers.admin-central.tls=true"
      - "traefik.http.routers.admin-central.tls.certresolver=letsencrypt"
      - "traefik.http.routers.admin-central.priority=150"
      - "traefik.http.routers.admin-central.service=admin-svc"

      # ── ADMIN tenant: subdominios /admin ───── prio 150
      - "traefik.http.routers.admin-tenant.rule=HostRegexp(`${APP_DOMAIN_REGEX}`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.admin-tenant.entrypoints=websecure"
      - "traefik.http.routers.admin-tenant.tls=true"
      - "traefik.http.routers.admin-tenant.tls.certresolver=letsencrypt"
      - "traefik.http.routers.admin-tenant.priority=150"
      - "traefik.http.routers.admin-tenant.service=admin-svc"

      # ── Servicio ──────────────────────────────────────
      - "traefik.http.services.admin-svc.loadbalancer.server.port=3000"

  # ═══════════════════════════════════════════════════════════
  # FRONTEND-PUBLIC - Docker Hub Image + Multitenant Support
  # ═══════════════════════════════════════════════════════════
  frontend-public:
    image: ${FRONTEND_PUBLIC_IMAGE}
    labels:
      - "traefik.enable=true"

      # ── PUBLIC central: dominio principal ─────────────────── prio 10
      - "traefik.http.routers.public-central.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.public-central.entrypoints=websecure"
      - "traefik.http.routers.public-central.tls=true"
      - "traefik.http.routers.public-central.tls.certresolver=letsencrypt"
      - "traefik.http.routers.public-central.priority=10"
      - "traefik.http.routers.public-central.service=public-svc"

      # ── PUBLIC tenant: subdominios ────────────────── prio 10
      - "traefik.http.routers.public-tenant.rule=HostRegexp(`${APP_DOMAIN_REGEX}`)"
      - "traefik.http.routers.public-tenant.entrypoints=websecure"
      - "traefik.http.routers.public-tenant.tls=true"
      - "traefik.http.routers.public-tenant.tls.certresolver=letsencrypt"
      - "traefik.http.routers.public-tenant.priority=10"
      - "traefik.http.routers.public-tenant.service=public-svc"

      # ── PUBLIC: dominios custom de tenants ───────────── prio 1
      - "traefik.http.routers.public-custom.rule=HostRegexp(`.+`)"
      - "traefik.http.routers.public-custom.entrypoints=websecure"
      - "traefik.http.routers.public-custom.tls=true"
      - "traefik.http.routers.public-custom.tls.certresolver=letsencrypt"
      - "traefik.http.routers.public-custom.priority=1"
      - "traefik.http.routers.public-custom.service=public-svc"

      # ── Servicio ─────────────────────────────────────────
      - "traefik.http.services.public-svc.loadbalancer.server.port=3000"

  # ═══════════════════════════════════════════════════════════
  # MYSQL - Configuración optimizada para EC2
  # ═══════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - inmobiliaria-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    command: >
      --mysql-native-password=ON
      --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE}
      --innodb-redo-log-capacity=${MYSQL_INNODB_REDO_LOG_CAPACITY}
      --innodb-flush-method=${MYSQL_INNODB_FLUSH_METHOD}
      --innodb-flush-log-at-trx-commit=${MYSQL_INNODB_FLUSH_LOG_AT_TRX_COMMIT}
      --max-connections=${MYSQL_MAX_CONNECTIONS}
      --table-open-cache=${MYSQL_TABLE_OPEN_CACHE}
      --max-allowed-packet=${MYSQL_MAX_ALLOWED_PACKET}
      --performance-schema=${MYSQL_PERFORMANCE_SCHEMA}
      --skip-log-bin
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${DB_USERNAME} -p${DB_PASSWORD} --silent"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  # ═══════════════════════════════════════════════════════════
  # PHPMYADMIN - Acceso protegido vía basic auth + Traefik
  # ═══════════════════════════════════════════════════════════
  phpmyadmin:
    image: phpmyadmin:latest
    ports: !override []
    networks:
      - inmobiliaria-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`db.${APP_DOMAIN}`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=websecure"
      - "traefik.http.routers.phpmyadmin.tls=true"
      - "traefik.http.routers.phpmyadmin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.phpmyadmin.middlewares=pma-auth"
      - "traefik.http.routers.phpmyadmin.priority=500"
      - "traefik.http.middlewares.pma-auth.basicauth.users=${PMA_BASIC_AUTH}"
      - "traefik.http.services.phpmyadmin-svc.loadbalancer.server.port=80"
      - "traefik.http.routers.phpmyadmin.service=phpmyadmin-svc"
