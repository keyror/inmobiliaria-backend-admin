services:
  # ═══════════════════════════════════════════════════════════
  # TRAEFIK - Configuración para DuckDNS
  # ═══════════════════════════════════════════════════════════
  traefik:
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=inmobiliaria-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # ── Let's Encrypt para SSL automático ──
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=tu-email@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # ── Redirección HTTP → HTTPS ──
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt

  # ═══════════════════════════════════════════════════════════
  # BACKEND - Variables para DuckDNS + Docker Hub Image
  # ═══════════════════════════════════════════════════════════
  backend:
    image: keymiro/inmobiliaria-backend:latest
    environment:
      # Base de datos
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=realstate_central
      - DB_USERNAME=root
      - DB_PASSWORD=root

      # URLs de la aplicación
      - APP_URL=https://inmobiliariaapp.duckdns.org
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=base64:abcd1234567890abcd1234567890abcd1234567890abcd==

  # ═══════════════════════════════════════════════════════════
  # NGINX-STORAGE - Docker Hub Image + Labels para DuckDNS
  # ═══════════════════════════════════════════════════════════
  nginx-storage:
    image: keymiro/inmobiliaria-nginx-storage:latest
    labels:
      - "traefik.enable=true"

      # ── STORAGE: *.inmobiliariaapp.duckdns.org/storage ──────── prio 300
      - "traefik.http.routers.storage.rule=PathPrefix(`/storage`) && (Host(`inmobiliariaapp.duckdns.org`) || HostRegexp(`^.+\\.inmobiliariaapp\\.duckdns\\.org$`))"
      - "traefik.http.routers.storage.entrypoints=websecure"
      - "traefik.http.routers.storage.tls=true"
      - "traefik.http.routers.storage.tls.certresolver=letsencrypt"
      - "traefik.http.routers.storage.priority=300"
      - "traefik.http.routers.storage.service=nginx-svc"

      # ── API: inmobiliariaapp.duckdns.org/api + *.inmobiliariaapp.duckdns.org/api ── prio 200
      - "traefik.http.routers.api-path.rule=PathPrefix(`/api`) && (Host(`inmobiliariaapp.duckdns.org`) || HostRegexp(`^.+\\.inmobiliariaapp\\.duckdns\\.org$`))"
      - "traefik.http.routers.api-path.entrypoints=websecure"
      - "traefik.http.routers.api-path.tls=true"
      - "traefik.http.routers.api-path.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api-path.priority=200"
      - "traefik.http.routers.api-path.service=nginx-svc"

      # ── Servicio ──────────────────────────────────────────
      - "traefik.http.services.nginx-svc.loadbalancer.server.port=80"

  # ═══════════════════════════════════════════════════════════
  # FRONTEND-ADMIN - Docker Hub Image + Multitenant Support
  # ═══════════════════════════════════════════════════════════
  frontend-admin:
    image: keymiro/inmobiliaria-frontend-admin:latest
    labels:
      - "traefik.enable=true"

      # ── ADMIN central: inmobiliariaapp.duckdns.org/admin ────── prio 150
      - "traefik.http.routers.admin-central.rule=Host(`inmobiliariaapp.duckdns.org`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.admin-central.entrypoints=websecure"
      - "traefik.http.routers.admin-central.tls=true"
      - "traefik.http.routers.admin-central.tls.certresolver=letsencrypt"
      - "traefik.http.routers.admin-central.priority=150"
      - "traefik.http.routers.admin-central.service=admin-svc"

      # ── ADMIN tenant: *.inmobiliariaapp.duckdns.org/admin ───── prio 150
      - "traefik.http.routers.admin-tenant.rule=HostRegexp(`^.+\\.inmobiliariaapp\\.duckdns\\.org$`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.admin-tenant.entrypoints=websecure"
      - "traefik.http.routers.admin-tenant.tls=true"
      - "traefik.http.routers.admin-tenant.tls.certresolver=letsencrypt"
      - "traefik.http.routers.admin-tenant.priority=150"
      - "traefik.http.routers.admin-tenant.service=admin-svc"

      # ── Servicio ──────────────────────────────────────
      - "traefik.http.services.admin-svc.loadbalancer.server.port=3000"

  # ═══════════════════════════════════════════════════════════
  # FRONTEND-PUBLIC - Docker Hub Image + Multitenant Support
  # ═══════════════════════════════════════════════════════════
  frontend-public:
    image: keymiro/inmobiliaria-frontend-public:latest
    labels:
      - "traefik.enable=true"

      # ── PUBLIC central: inmobiliariaapp.duckdns.org ─────────────────── prio 10
      - "traefik.http.routers.public-central.rule=Host(`inmobiliariaapp.duckdns.org`)"
      - "traefik.http.routers.public-central.entrypoints=websecure"
      - "traefik.http.routers.public-central.tls=true"
      - "traefik.http.routers.public-central.tls.certresolver=letsencrypt"
      - "traefik.http.routers.public-central.priority=10"
      - "traefik.http.routers.public-central.service=public-svc"

      # ── PUBLIC tenant: *.inmobiliariaapp.duckdns.org ────────────────── prio 10
      - "traefik.http.routers.public-tenant.rule=HostRegexp(`^.+\\.inmobiliariaapp\\.duckdns\\.org$`)"
      - "traefik.http.routers.public-tenant.entrypoints=websecure"
      - "traefik.http.routers.public-tenant.tls=true"
      - "traefik.http.routers.public-tenant.tls.certresolver=letsencrypt"
      - "traefik.http.routers.public-tenant.priority=10"
      - "traefik.http.routers.public-tenant.service=public-svc"

      # ── Servicio ─────────────────────────────────────────
      - "traefik.http.services.public-svc.loadbalancer.server.port=3000"

  # ═══════════════════════════════════════════════════════════
  # MYSQL - Mantiene configuración original
  # ═══════════════════════════════════════════════════════════
  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: realstate_central
